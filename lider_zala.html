<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,sans-serif;background:#f5f5f7;color:#1a1a1a;}

/* Шапка */
.hdr{background:#ad1472;padding:12px 16px 0;position:sticky;top:0;z-index:100;box-shadow:0 2px 10px rgba(173,20,114,.3);}
.hdr-top{display:flex;align-items:baseline;gap:10px;margin-bottom:10px;}
.hdr-title{color:#fff;font-size:15px;font-weight:700;}
.hdr-date{color:rgba(255,255,255,.65);font-size:11px;}

/* Вкладки в шапке */
.tabs{display:flex;gap:8px;}
.tab{padding:8px 18px;border-radius:20px 20px 0 0;border:2px solid rgba(255,255,255,.4);color:rgba(255,255,255,.7);background:transparent;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;}
.tab.on{background:#fff;color:#ad1472;border-color:#fff;}

/* Экраны */
.scr{display:none;padding:14px;}
.scr.on{display:block;}

/* 4 карточки в ряд */
.sumrow{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.sumcard{background:#fff;border-radius:14px;padding:14px 16px;flex:1;min-width:120px;box-shadow:0 1px 5px rgba(0,0,0,.07);}
.sumcard .big{font-size:28px;font-weight:700;line-height:1.1;}
.sumcard .lbl{font-size:11px;color:#888;margin-top:4px;line-height:1.3;}
.sc-pink .big{color:#ad1472;}
.sc-red  .big{color:#dc2626;}
.sc-grn  .big{color:#16a34a;}
.sc-dark .big{color:#1a1a1a;}

/* Плитки подразделений */
.tgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;}
.tile{background:#fff;border-radius:16px;padding:16px;box-shadow:0 1px 8px rgba(0,0,0,.08);cursor:pointer;transition:transform .15s,box-shadow .15s;border-top:4px solid #ccc;}
.tile:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(0,0,0,.13);}
.t-hi{border-top-color:#dc2626;}
.t-md{border-top-color:#eab308;}
.t-ok{border-top-color:#16a34a;}
.tile-name{font-size:16px;font-weight:700;margin-bottom:10px;}
.tile-row{display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px;}
.tile-row .l{color:#888;}
.tile-row .v{font-weight:600;}
.bar-bg{background:#f0f0f0;border-radius:5px;height:7px;overflow:hidden;margin:8px 0 3px;}
.bar-fg{height:100%;border-radius:5px;}
.bar-nums{display:flex;justify-content:space-between;font-size:11px;color:#999;}
.def-box{background:#fee2e2;border-radius:10px;padding:8px 12px;margin-top:10px;display:flex;justify-content:space-between;align-items:center;}
.def-n{font-size:20px;font-weight:700;color:#dc2626;}
.def-l{font-size:11px;color:#dc2626;}
.ok-box{background:#dcfce7;border-radius:10px;padding:9px 12px;margin-top:10px;text-align:center;color:#16a34a;font-weight:700;font-size:13px;}
.tile-hint{text-align:center;font-size:11px;color:#ccc;margin-top:8px;}

/* Детали подразделения */
.back{display:inline-flex;align-items:center;gap:5px;background:#fff;border:1.5px solid #ad1472;color:#ad1472;padding:6px 14px;border-radius:16px;font-size:13px;font-weight:600;cursor:pointer;margin-bottom:12px;}
.back:hover{background:#fdf2f8;}
.det-hdr{background:#fff;border-radius:14px;padding:14px;margin-bottom:12px;box-shadow:0 1px 5px rgba(0,0,0,.07);}
.det-name{font-size:18px;font-weight:700;color:#ad1472;margin-bottom:10px;}
.det-stats{display:flex;gap:18px;flex-wrap:wrap;}
.dstat .n{font-size:20px;font-weight:700;}
.dstat .l{font-size:11px;color:#888;}
.ds-pink .n{color:#ad1472;} .ds-red .n{color:#dc2626;} .ds-grn .n{color:#16a34a;}

/* Фильтры */
.fbar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center;}
.fbtn{padding:6px 14px;border-radius:14px;border:1.5px solid #ddd;background:#fff;font-size:12px;cursor:pointer;transition:all .15s;}
.fbtn.on{background:#ad1472;border-color:#ad1472;color:#fff;font-weight:600;}
.fsrch{padding:7px 12px;border:1.5px solid #ddd;border-radius:14px;font-size:12px;flex:1;min-width:130px;}
.fsrch:focus{outline:none;border-color:#ad1472;}

/* Таблица */
.twrap{background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 1px 5px rgba(0,0,0,.07);}
.twrap-ttl{padding:11px 16px;background:#fdf2f8;border-bottom:1px solid #f0d0e8;font-size:13px;color:#ad1472;font-weight:600;}
.tbl{width:100%;border-collapse:separate;border-spacing:0;font-size:13px;}
.tbl th{background:#faf5fd;color:#ad1472;font-size:11px;text-transform:uppercase;padding:9px 11px;text-align:left;border-bottom:2px solid #f0d0e8;white-space:nowrap;}
.tbl th:nth-child(1),.tbl td:nth-child(1){position:sticky;left:0;z-index:2;background:#faf5fd;border-right:1px solid #f0d0e8;min-width:60px;}
.tbl td:nth-child(1){background:#fff;}
.tr-red td:nth-child(1){background:#fff8f8;}
.tr-ok td:nth-child(1){background:#f8fff8;}
.tr-ovr td:nth-child(1){background:#f0fff8;}
.tr-tot td:nth-child(1){background:#fdf2f8;}
.tbl th:nth-child(2),.tbl td:nth-child(2){position:sticky;left:60px;z-index:2;background:#faf5fd;border-right:1px solid #eee;max-width:150px;}
.tbl td:nth-child(2){background:#fff;}
.tr-red td:nth-child(2){background:#fff8f8;}
.tr-ok td:nth-child(2){background:#f8fff8;}
.tr-ovr td:nth-child(2){background:#f0fff8;}
.tr-tot td:nth-child(2){background:#fdf2f8;}
.tbl td{padding:9px 11px;border-bottom:1px solid #f7f7f7;vertical-align:middle;}
.tbl tr:last-child td{border-bottom:none;}
.tr-red td{background:#fff8f8;}
.tr-ok  td{background:#f8fff8;}
.tr-ovr td{background:#f0fff8;}
.tr-tot td{background:#fdf2f8;font-weight:700;color:#ad1472;}
.bdg{display:inline-block;padding:2px 9px;border-radius:10px;font-size:12px;font-weight:600;}
.bdg-red{background:#fee2e2;color:#dc2626;}
.bdg-grn{background:#dcfce7;color:#16a34a;}
.bdg-blu{background:#dbeafe;color:#1d4ed8;}
.gold-t{background:#fef3c7;color:#92400e;font-size:11px;padding:2px 7px;border-radius:8px;}
.nogld-t{background:#f3f4f6;color:#6b7280;font-size:11px;padding:2px 7px;border-radius:8px;}
.names{font-size:11px;color:#555;line-height:1.4;}
</style>
</head>

    </div>
  </div>
</div>

function fmtR(v){return Math.round(v).toString().replace(/\B(?=(\d{3})+(?!\d))/g,'\u00a0')+'\u20bd';}
function planColor(p){return p>=100?'#16a34a':p>=80?'#92400e':'#dc2626';}
function barColor(have,need){const p=need>0?Math.min(100,have/need*100):100;return p>=100?'#16a34a':p>=70?'#eab308':'#dc2626';}

function switchTab(t){
  if(t==='region'){
    document.getElementById('s-region').classList.add('on');
    document.getElementById('s-detail').classList.remove('on');
    document.getElementById('tab-region').classList.add('on');
    document.getElementById('tab-detail').classList.remove('on');
  } else {
    document.getElementById('s-detail').classList.add('on');
    document.getElementById('s-region').classList.remove('on');
    document.getElementById('tab-detail').classList.add('on');
    document.getElementById('tab-region').classList.remove('on');
    window.scrollTo(0, 0);
  }
}

function renderTiles(){
  const order=Object.keys(PODS).sort((a,b)=>PODS[b].deficit-PODS[a].deficit);
  let h='';
  for(const pod of order){
    const p=PODS[pod];
    const pct=p.need>0?Math.min(100,Math.round(p.have/p.need*100)):100;
    const bc=barColor(p.have,p.need);
    const cls=p.deficit>5?'t-hi':p.deficit>0?'t-md':'t-ok';
    const podLoss=p.plan_avg>=100?'<div class="ok-box" style="margin-top:8px">👍 План выполнен</div>':p.plan_avg>0?`<div class="def-box" style="margin-top:8px"><div class="def-l">📉 потери ЮИ</div><div class="def-n" style="font-size:16px">−${Math.round(p.toYI/(p.plan_avg/100)-p.toYI).toString().replace(/\B(?=(\d{3})+(?!\d))/g,'\u00a0')}₽</div></div>`:'';
    const defB=p.deficit>0
      ?`<div class="def-box"><div class="def-l">не хватает</div><div class="def-n">−${p.deficit} чел.</div></div>`
      :`<div class="ok-box">✅ Штат укомплектован</div>`;
    h+=`<div class="tile ${cls}" onclick="openPod('${pod}')">
      <div class="tile-name">${pod}</div>
      <div class="tile-row"><span class="l">Магазинов</span><span class="v">${p.total}</span></div>
      <div class="tile-row"><span class="l">ТО ЮИ месяц</span><span class="v">${fmtR(p.toYI)}</span></div>
      <div class="tile-row"><span class="l">Выполнение плана</span><span class="v" style="color:${planColor(p.plan_avg)};font-weight:700">${p.plan_avg}%</span></div>
      <div class="bar-bg"><div class="bar-fg" style="width:${pct}%;background:${bc}"></div></div>
      <div class="bar-nums"><span>Есть: <b>${p.have}</b></span><span>Нужно: <b>${p.need}</b></span></div>
      ${podLoss}
      ${defB}
      <div class="tile-hint">нажмите для деталей →</div>
    </div>`;
  }
  document.getElementById('tiles').innerHTML=h;
}

let curPod='', curF='all';

function openPod(pod){
  curPod=pod; curF='all';
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('on'));
  document.querySelectorAll('.fbtn')[0].classList.add('on');
  document.getElementById('fsrch').value='';
  document.getElementById('tab-detail-name').textContent=pod;
  document.getElementById('tab-detail').disabled=false;

  const p=PODS[pod];
  document.getElementById('det-sumrow').innerHTML=`
    <div class="sumcard sc-red"><div class="big">−${p.deficit}</div><div class="lbl">не хватает продавцов</div></div>
    <div class="sumcard sc-grn"><div class="big">${p.have}</div><div class="lbl">продавцов в штате</div></div>
    <div class="sumcard"><div class="big" style="color:${planColor(p.plan_avg)}">${p.plan_avg}%</div><div class="lbl">выполнение плана</div></div>
    <div class="sumcard sc-pink"><div class="big">${fmtR(p.toYI)}</div><div class="lbl">ТО ЮИ за месяц</div></div>
  `;
  renderTbl();
  switchTab('detail');
}

function setF(f,btn){
  curF=f;
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  renderTbl();
}

function renderTbl(){
  const srch=document.getElementById('fsrch').value.toLowerCase();
  let rows=STORES.filter(s=>s.pod===curPod);
  if(curF==='def') rows=rows.filter(s=>s.deficit>0);
  if(curF==='ok')  rows=rows.filter(s=>s.deficit<=0);
  if(srch) rows=rows.filter(s=>s.tc.toLowerCase().includes(srch)||s.mag.includes(srch));
  rows.sort((a,b)=>b.deficit-a.deficit);
  let tN=0,tH=0,tD=0,tS=0,tP=[];
  let html='';
  for(const s of rows){
    tN+=s.need;tH+=s.have;tD+=s.deficit;tS+=s.toYI;
    if(s.plan_pct) tP.push(s.plan_pct);
    const rc=s.deficit>0?'tr-red':s.deficit<0?'tr-ovr':'tr-ok';
    const db=s.deficit>0?`<span class="bdg bdg-red">−${s.deficit}</span>`
            :s.deficit<0?`<span class="bdg bdg-blu">+${Math.abs(s.deficit)}</span>`
            :`<span class="bdg bdg-grn">норма</span>`;
    const gt=s.has_gold?`<span class="gold-t">С золотом</span>`:`<span class="nogld-t">Без золота</span>`;
    const names=s.names.length?`<div class="names">${s.names.join('<br>')}</div>`:'<span style="color:#ccc">—</span>';
    const lossHtml=s.plan_pct>=100?'<span style="color:#16a34a;font-size:12px">👍</span>':s.plan_pct>0?`<span style="color:#dc2626;font-size:12px;font-weight:600">−${Math.round(s.toYI/(s.plan_pct/100)-s.toYI).toString().replace(/\B(?=(\d{3})+(?!\d))/g,'\u00a0')}₽</span>`:'—';
    html+=`<tr class="${rc}">
      <td><b>${s.mag}</b></td><td style="max-width:190px">${s.tc}</td><td>${gt}</td>
      <td>${s.need}</td><td>${s.have}</td><td>${db}</td>
      <td style="white-space:nowrap">${fmtR(s.toYI)}</td>
      <td><b style="color:${planColor(s.plan_pct)}">${s.plan_pct}%</b></td>
      <td>${lossHtml}</td>
      <td>${names}</td>
    </tr>`;
  }
  const avgP=tP.length?Math.round(tP.reduce((a,b)=>a+b)/tP.length):0;
  const tdb=tD>0?`<span class="bdg bdg-red">−${tD}</span>`:`<span class="bdg bdg-grn">норма</span>`;
  html+=`<tr class="tr-tot">
    <td colspan="3">ИТОГО (${rows.length} маг.)</td>
    <td>${tN}</td><td>${tH}</td><td>${tdb}</td>
    <td style="white-space:nowrap">${fmtR(tS)}</td>
    <td style="color:${planColor(avgP)}">${avgP}%</td><td></td><td></td>
  </tr>`;
  document.getElementById('tbl-body').innerHTML=html;
}

renderTiles();
</script>
