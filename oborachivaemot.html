<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f7;color:#1c1c1e;font-size:14px}
:root{--pink:#ad1472;--pink-light:#f5e6f0;--gold-bg:#fffbeb;--gold-text:#92400e;
  --g-bg:#dcfce7;--g-text:#14532d;
  --y-bg:#fef9c3;--y-text:#713f12;
  --r-bg:#fee2e2;--r-text:#7f1d1d;
  --dr-bg:#7f1d1d;--dr-text:#fecaca;
  --n-bg:#f3f4f6;--n-text:#374151}
.header{background:var(--pink);color:#fff;padding:12px 16px;position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:10px}
.header h1{font-size:16px;font-weight:700;flex:1}
.back-btn{background:rgba(255,255,255,.2);border:none;color:#fff;padding:6px 12px;border-radius:8px;font-size:13px;cursor:pointer;display:none}
.screen{display:none;padding:12px;max-width:700px;margin:0 auto}
.screen.active{display:block}
.metrics{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px}
.metrics.three{grid-template-columns:repeat(3,1fr)}
.metrics.four{grid-template-columns:repeat(2,1fr)}
.metric-card{background:#fff;border-radius:12px;padding:12px 10px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.metric-card .val{font-size:22px;font-weight:700;line-height:1.1}
.metric-card .lbl{font-size:11px;color:#666;margin-top:3px}
.metric-card .sub{font-size:10px;color:#999;margin-top:2px}
.metric-card.highlight{background:var(--pink);color:#fff}
.metric-card.highlight .lbl,.metric-card.highlight .sub{color:rgba(255,255,255,.8)}
.metric-card.gold-card{background:var(--gold-bg)}
.metric-card.gold-card .val{color:var(--gold-text)}
.metric-card.gold-card.highlight .lbl,.metric-card.gold-card.highlight .sub{color:var(--gold-text);opacity:.85}
.section-title{font-size:13px;font-weight:700;color:var(--pink);margin:14px 0 6px;text-transform:uppercase;letter-spacing:.5px}
.table-wrap{background:#fff;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.08);margin-bottom:12px;overflow-x:auto;overflow-y:auto;max-height:70vh}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:var(--pink);color:#fff;padding:8px 6px;text-align:left;font-weight:600;font-size:11px;white-space:nowrap;position:sticky;top:0;z-index:2}
th.gold{background:#d97706}
th.r,td.r{text-align:right}
th.c,td.c{text-align:center}
td{padding:7px 6px;border-bottom:1px solid #f0f0f0;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafafa}
.store-name{font-weight:600;font-size:12px}
.store-tc{font-size:10px;color:#888;display:block}
.tG {background:var(--g-bg);color:var(--g-text);border-radius:6px;padding:2px 6px;font-weight:700;display:inline-block}
.tLG{background:#d1fae5;color:#065f46;border-radius:6px;padding:2px 6px;font-weight:600;display:inline-block}
.tY {background:var(--y-bg);color:var(--y-text);border-radius:6px;padding:2px 6px;font-weight:600;display:inline-block}
.tR {background:var(--r-bg);color:var(--r-text);border-radius:6px;padding:2px 6px;font-weight:600;display:inline-block}
.tDR{background:var(--dr-bg);color:var(--dr-text);border-radius:6px;padding:2px 6px;font-weight:600;display:inline-block}
.tN {background:var(--n-bg);color:var(--n-text);border-radius:6px;padding:2px 6px;display:inline-block}
.fill-ok{color:#16a34a;font-weight:700}
.fill-warn{color:#d97706;font-weight:600}
.fill-bad{color:#dc2626;font-weight:700}
.tabs-bar{display:flex;gap:6px;margin-bottom:12px}
.tab-btn{flex:1;padding:8px;border:2px solid var(--pink);border-radius:10px;background:#fff;color:var(--pink);font-size:13px;font-weight:600;cursor:pointer}
.tab-btn.gold-tab{border-color:#d97706;color:#d97706}
.tab-btn.active{background:var(--pink);color:#fff}
.tab-btn.gold-tab.active{background:#d97706;color:#fff}
.tab-pane{display:none}
.tab-pane.active{display:block}
.gold-badge{background:var(--gold-bg);color:var(--gold-text);border-radius:6px;padding:2px 7px;font-size:11px;font-weight:600}
.store-header{background:#fff;border-radius:12px;padding:14px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.store-header .mag-num{font-size:12px;color:#999}
.store-header .mag-name{font-size:17px;font-weight:700;margin:3px 0}
.store-header .mag-pod{font-size:13px;color:var(--pink);font-weight:600}
.cat-table th{font-size:10px}
.cat-table td{font-size:11px}
.topbot{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.topbot-card{background:#fff;border-radius:12px;padding:10px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.topbot-card h3{font-size:11px;font-weight:700;margin-bottom:8px;padding-bottom:5px;border-bottom:2px solid #f0f0f0}
.topbot-card h3.top{color:#16a34a;border-color:#dcfce7}
.topbot-card h3.bot{color:#dc2626;border-color:#fee2e2}
.topbot-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid #f9f9f9;font-size:11px}
.topbot-row:last-child{border-bottom:none}
.topbot-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-right:4px}
.rank-badge{display:inline-block;background:var(--pink);color:#fff;border-radius:8px;padding:3px 8px;font-size:12px;font-weight:700}
.rank-badge.gold{background:#d97706}
.divider{height:1px;background:#f0f0f0;margin:12px 0}
</style>

    <input id="pwInput" type="password" placeholder="Введите пароль"
      style="width:100%;box-sizing:border-box;padding:10px 14px;border:2px solid #e0c8d8;border-radius:10px;font-size:15px;outline:none;text-align:center"
      onkeydown="if(event.key==='Enter')checkPw()">
    <div id="pwErr" style="color:#dc2626;font-size:12px;margin-top:8px;min-height:16px"></div>
    <button onclick="checkPw()"
      style="margin-top:12px;width:100%;padding:11px;background:#ad1472;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer">
      Войти
    </button>
  </div>
</div>
<script>
  document.addEventListener('DOMContentLoaded', function(){
    document.getElementById('pwInput').focus();
  });

  function checkPw(){
    var v = document.getElementById('pwInput').value.trim();
    var variants = ['юи','ЮИ','Юи','юИ','yui','YUI','Yui','ui','UI','кари','КАРИ','Кари','kari','KARI'];
    if(variants.indexOf(v) !== -1){
      document.getElementById('pwScreen').style.display='none';
    } else {
      document.getElementById('pwErr').textContent='Неверный пароль. Введите: ЮИ';
      document.getElementById('pwInput').value='';
      document.getElementById('pwInput').focus();
    }
  }
</script>

function num(x){return x!=null?Math.round(x):'—';}
function pct(x){return x!=null?Math.round(x)+'%':'—';}

function turnCls(t,isGold){
  if(t==null)return 'tN';
  if(t===0)return 'tDR'; // нет продаж — критично
  if(!isGold){if(t<=35)return 'tG';if(t<=45)return 'tLG';if(t<=55)return 'tY';if(t<=70)return 'tR';return 'tDR';}
  else{if(t<=45)return 'tG';if(t<=60)return 'tLG';if(t<=75)return 'tY';if(t<=90)return 'tR';return 'tDR';}
}
// Цвет относительно оборачиваемости ЮГ (для таблицы категорий)
function turnClsRel(t,regTurn){
  if(t==null)return 'tN';
  if(t===0)return 'tDR';
  if(regTurn==null)return 'tN';
  if(t<=regTurn*0.78)return 'tG';   // значительно лучше ЮГ
  if(t<=regTurn)return 'tLG';        // лучше или равно ЮГ
  if(t<=regTurn*1.22)return 'tY';   // до 22% хуже ЮГ
  if(t<=regTurn*1.56)return 'tR';   // до 56% хуже ЮГ
  return 'tDR';                       // критично хуже ЮГ
}
function turnTag(t,isGold){
  if(t==null)return '<span class="tN">—</span>';
  if(t===0)return '<span class="tDR">нет продаж</span>';
  return `<span class="${turnCls(t,isGold)}">${Math.round(t)} нед</span>`;
}
function fillCls(f){if(f==null)return '';if(f>=100)return 'fill-ok';if(f>=85)return 'fill-warn';return 'fill-bad';}
function fillTag(f){if(f==null)return '—';return `<span class="${fillCls(f)}">${Math.round(f)}%</span>`;}

let _history=[];
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.getElementById('backBtn').style.display=_history.length>0?'block':'none';
}
function goBack(){
  if(!_history.length)return;
  const prev=_history.pop();
  if(prev==='region')renderRegion();
  else if(prev.startsWith('pod:'))renderPod(prev.slice(4));
}
function pushHistory(s){_history.push(s);}

function route(){

  const mag=p.get('mag'),pod=p.get('pod');
  if(mag)renderMag(mag);else if(pod)renderPod(pod);else renderRegion();
}

function buildStoreMetrics(s,g,isGold){

    let html=`<div class="metrics">
      <div class="metric-card highlight">
        <div class="val">${s.turn!=null?Math.round(s.turn):'—'}</div>
        <div class="lbl">Оборачиваемость, нед</div>

      </div>
      <div class="metric-card">
        <div class="val ${fillCls(s.fill)}">${s.fill!=null?Math.round(s.fill)+'%':'—'}</div>
        <div class="lbl">Наполненность витрины</div>
        <div class="sub">${s.fillKor!=null?'Корр: '+Math.round(s.fillKor)+'%':''}</div>
      </div>
      <div class="metric-card">
        <div class="val">${num(s.sales)}</div>
        <div class="lbl">Продажи, шт/28 дн</div>
        <div class="sub">ЮГ ср: ${REG_SER.sales_avg!=null?Math.round(REG_SER.sales_avg):'—'} шт</div>
      </div>
      <div class="metric-card">
        <div class="val">${num(s.stock)}</div>
        <div class="lbl">Остаток, шт</div>
        <div class="sub">Модулей: ${num(s.modules)}</div>
      </div>
    </div>`;
    if(diff!=null){
      html+=`<div class="store-header" style="padding:10px 14px;margin-bottom:12px">
        <div style="font-size:12px;color:#666">Подразделение <b>${s.pod}</b>: ${podS.turnover} нед</div>
        <div style="font-size:13px;font-weight:600;margin-top:3px">Ваш магазин: <span class="${dCls}">${dSign}${diff} нед ${diff<0?'(лучше ✓)':diff===0?'(= среднему)':'(хуже)'}</span></div>
      </div>`;

    let html=`<div class="metrics">
      <div class="metric-card gold-card highlight">
        <div class="val">${g.turn!=null?Math.round(g.turn):'—'}</div>
        <div class="lbl">Оборачиваемость, нед</div>
        <div class="sub">ЮГ ср: ${REG_GOLD.turnover} нед</div>
      </div>
      <div class="metric-card gold-card">
        <div class="val ${fillCls(g.fill)}">${g.fill!=null?Math.round(g.fill)+'%':'—'}</div>
        <div class="lbl">Наполненность витрины</div>
        <div class="sub">${g.fillKor!=null?'Корр: '+Math.round(g.fillKor)+'%':''}</div>
      </div>
      <div class="metric-card gold-card">
        <div class="val">${num(g.sales)}</div>
        <div class="lbl">Продажи, шт/28 дн</div>
        <div class="sub">ЮГ ср: ${REG_GOLD.sales_avg!=null?Math.round(REG_GOLD.sales_avg):'—'} шт</div>
      </div>
      <div class="metric-card gold-card">
        <div class="val">${num(g.stock)}</div>
        <div class="lbl">Физ. запас, шт</div>
        <div class="sub">Модулей: ${num(g.modules)}</div>
      </div>

        <div style="font-size:12px;color:#666">Подразделение <b>${g.pod}</b>: ${podG.turnover} нед</div>
        <div style="font-size:13px;font-weight:600;margin-top:3px">Ваш магазин: <span class="${dClsG}">${dSignG}${diffG} нед ${diffG<0?'(лучше ✓)':diffG===0?'(= среднему)':'(хуже)'}</span></div>
      </div>`;
    }

function buildCatTable(s,isGold,regTurn){
  if(!s.cat)return '';
  const thCls=isGold?'gold':'';
  let html=`<div class="section-title">${isGold?'⭐':'🥈'} Категории ЮИ</div>
  <div class="table-wrap"><table class="cat-table">
    <tr><th>Категория</th><th class="r ${thCls}">Витрина</th><th class="r ${thCls}">Запас</th><th class="c ${thCls}">Оборачив.</th></tr>`;
  const cats=['Кольца','Серьги','Цепочки','Браслеты','Колье','Подвески'];
  cats.forEach(cat=>{
    const c=s.cat[cat];
    if(!c)return;
    const catTurnHtml=c.turn!=null
      ?`<span class="${turnClsRel(c.turn,regTurn)}">${Math.round(c.turn)} нед</span>`
      :'<span class="tN">—</span>';
    html+=`<tr>
      <td style="font-weight:600">${cat}</td>
      <td class="r">${num(c.fact)}</td>
      <td class="r">${num(c.stock)}</td>
      <td class="c">${catTurnHtml}</td>
    </tr>`;
  });
  html+=`</table></div>`;
  return html;
}

function renderMag(magNum){
  const s=silverByMag[magNum],g=goldByMag[magNum];
  if(!s&&!g){
    document.getElementById('notFoundMsg').textContent='Магазин №'+magNum+' не найден.';
    showScreen('screenNotFound');return;
  }
  const store=s||g;
  document.getElementById('headerTitle').textContent='№'+magNum;
  document.getElementById('headerSub').textContent=store.tc;
  document.getElementById('backBtn').style.display='none';

  let html=`<div class="store-header">
    <div class="mag-num">Магазин № ${magNum}</div>
    <div class="mag-name">${store.tc}</div>
    <div class="mag-pod">🏢 ${store.pod} ${g?'<span class="gold-badge">⭐ Золото</span>':''}</div>
    <div style="font-size:11px;color:#999;margin-top:4px">Период: ${PERIOD}</div>
  </div>`;

  if(s&&g){
    html+=`<div class="tabs-bar">
      <button class="tab-btn active" onclick="switchTab('mag','ser',this)">🥈 Серебро</button>
      <button class="tab-btn gold-tab" onclick="switchTab('mag','gold',this)">⭐ Золото</button>
    </div>
    <div class="tab-pane active" id="mag-tab-ser">${buildStoreMetrics(s,g,false)}</div>
    <div class="tab-pane" id="mag-tab-gold">${buildStoreMetrics(s,g,true)}</div>`;
  } else if(s){
    html+=buildStoreMetrics(s,null,false);
  } else {
    html+=buildStoreMetrics(null,g,true);
  }

  document.getElementById('magContent').innerHTML=html;
  showScreen('screenMag');
}

      <td class="c">${turnTag(s.turn,false)}</td>
      <td class="c">${fillTag(s.fill)}</td>
      <td class="r">${num(s.stock)}</td>
      <td class="r">${num(s.sales)}</td>
    </tr>`;
  });
  html+=`</table></div></div>`;

  // Таблица золото
  if(hasG){
    const allG=[...storesG].sort((a,b)=>(a.turn||999)-(b.turn||999));
    const sortedG=[...storesG].filter(g=>g.turn!=null).sort((a,b)=>a.turn-b.turn);
    const top3G=sortedG.slice(0,3);
    const bot3G=sortedG.slice(-3).reverse();
    html+=`<div class="tab-pane" id="pod-tab-gold">`;
    // Метрики золото подразделения
    if(podG){
      html+=`<div class="metrics">
        <div class="metric-card gold-card highlight">
          <div class="val">${podG.turnover||'—'}</div>
          <div class="lbl">Оборачиваемость золото</div>
          <div class="sub">ЮГ: ${REG_GOLD.turnover} нед</div>
        </div>
        <div class="metric-card gold-card">
          <div class="val">${storesG.length}</div>
          <div class="lbl">Магазинов золото</div>
        </div>
      </div>`;
    }
    // Топ/Антитоп золото
    if(top3G.length>0){
      html+=`<div class="topbot">
        <div class="topbot-card"><h3 class="top">✅ Топ-3</h3>`;
      top3G.forEach(g=>{
        const city=g.tc.split(',')[0].trim();
        html+=`<div class="topbot-row"><span class="topbot-name" title="${g.tc}"><b>${g.mag}</b> ${city}</span>${turnTag(g.turn,true)}</div>`;
      });
      html+=`</div><div class="topbot-card"><h3 class="bot">🔴 Антитоп-3</h3>`;
      bot3G.forEach(g=>{
        const city=g.tc.split(',')[0].trim();
        html+=`<div class="topbot-row"><span class="topbot-name" title="${g.tc}"><b>${g.mag}</b> ${city}</span>${turnTag(g.turn,true)}</div>`;
      });
      html+=`</div></div>`;
    }
    html+=`<div class="table-wrap"><table>
      <tr><th>Магазин</th><th class="c gold">Кат</th><th class="c gold">Оборач.</th><th class="c gold">Наполн.</th><th class="r gold">Физ. запас</th><th class="r gold">Продажи, шт</th></tr>`;
    allG.forEach(g=>{
      html+=`<tr onclick="openMag('${g.mag}')" style="cursor:pointer">
        <td title="${g.tc}" style="white-space:nowrap"><b>${g.mag}</b><br><span style="font-size:9px;color:#888">${(function(tc){var p=tc.split(',');var c=p[0].trim();return(c.startsWith('ТЦ')||c.startsWith('ТРЦ')||c.startsWith('ТРК')||c.startsWith('ТК'))?(p[1]||c).trim().slice(0,11):c.slice(0,11);})(g.tc)}</span></td>
        <td class="c" style="font-weight:600">${g.catYU!=null?Math.round(g.catYU):'—'}</td>
        <td class="c">${turnTag(g.turn,true)}</td>
        <td class="c">${fillTag(g.fill)}</td>
        <td class="r">${num(g.stock)}</td>
        <td class="r">${num(g.sales)}</td>
      </tr>`;
    });
    html+=`</table></div></div>`;
  }

  document.getElementById('podContent').innerHTML=html;
  showScreen('screenPod');
}

// ── ЭКРАН: РЕГИОН ──
function renderRegion(){
  document.getElementById('headerTitle').textContent='ЮИ · Оборачиваемость';
  document.getElementById('headerSub').textContent='Регион ЮГ · '+PERIOD;
  document.getElementById('backBtn').style.display='none';
  _history=[];

  const pods=['Краснодар','Черноморское','Кавказ','Крым','Ростов','Сочи'];

  // Сначала таб-бар
  let html=`<div class="tabs-bar">
    <button class="tab-btn active" onclick="switchTab('reg','ser',this)">🥈 Серебро</button>

  </div>`;

  // Вкладка Серебро — метрики только здесь
  html+=`<div class="tab-pane active" id="reg-tab-ser">`;

      <div class="val">${REG_SER.turnover}</div>
      <div class="lbl">Оборачиваемость серебро</div>
      <div class="sub">Место #${REG_SER.rating||2} в КАРИ</div>
    </div>

      <div class="val">${SILVER.length}</div>
      <div class="lbl">Магазинов серебро</div>
    </div>
  </div>`;
  html+=`<div class="section-title">Подразделения</div>
  <div class="table-wrap"><table>
    <tr><th>Подразделение</th><th class="c">Оборач.</th><th class="r">Продажи ср, штук</th><th class="r">Магазинов</th></tr>`;
  const podsSorted=pods.filter(p=>POD_SER[p]).sort((a,b)=>(POD_SER[a].turnover||999)-(POD_SER[b].turnover||999));
  podsSorted.forEach(pod=>{
    const ps=POD_SER[pod];
    const cnt=SILVER.filter(s=>s.pod===pod).length;
    html+=`<tr onclick="openPod('${pod}')" style="cursor:pointer">
      <td style="font-weight:700;color:var(--pink)">${pod}</td>

      <td class="r">${ps.sales_avg!=null?ps.sales_avg:'—'}</td>
      <td class="r">${cnt}</td>
    </tr>`;
  });
  html+=`</table></div>`;
  
  html+=`<div class="section-title">Все магазины · Серебро</div>
  <div class="table-wrap"><table>
    <tr><th>Магазин</th><th>Под.</th><th class="c">Кат</th><th class="c">Об.</th><th class="c">Наполн.</th><th class="r">Физ. запас</th><th class="r">Продажи, шт</th></tr>`;
  [...SILVER].sort((a,b)=>(a.turn||999)-(b.turn||999)).forEach(s=>{
    html+=`<tr onclick="openMag('${s.mag}')" style="cursor:pointer">
      <td title="${s.tc}" style="white-space:nowrap"><b>${s.mag}</b><br><span style="font-size:9px;color:#888">${(function(tc){var p=tc.split(',');var c=p[0].trim();return(c.startsWith('ТЦ')||c.startsWith('ТРЦ')||c.startsWith('ТРК')||c.startsWith('ТК'))?(p[1]||c).trim().slice(0,11):c.slice(0,11);})(s.tc)}</span></td>
      <td style="font-size:11px;color:#666">${s.pod}</td>
      <td class="c" style="font-weight:600">${s.catYU!=null?Math.round(s.catYU):'—'}</td>
      <td class="c">${turnTag(s.turn,false)}</td>
      <td class="c">${fillTag(s.fill)}</td>
      <td class="r">${num(s.stock)}</td>
      <td class="r">${num(s.sales)}</td>
    </tr>`;
  });
  html+=`</table></div></div>`;

  // Вкладка Золото
  html+=`<div class="tab-pane" id="reg-tab-gold">`;
  html+=`<div class="metrics">
    <div class="metric-card gold-card highlight">
      <div class="val">${REG_GOLD.turnover}</div>
      <div class="lbl" style="color:var(--gold-text);opacity:.9">Оборачиваемость золото</div>
      <div class="sub" style="color:var(--gold-text);opacity:.85">Место #${REG_GOLD.turnRank} в КАРИ</div>
    </div>
    <div class="metric-card gold-card">
      <div class="val">${GOLD.length}</div>
      <div class="lbl">Магазинов золото</div>
    </div>
  </div>`;
  html+=`<div class="section-title">Подразделения · Золото</div>
  <div class="table-wrap"><table>
    <tr><th>Подразделение</th><th class="c gold">Оборач.</th><th class="r gold">Продажи ср, штук</th><th class="r gold">Магазинов</th></tr>`;
  const podsGSorted=pods.filter(p=>POD_GOLD[p]).sort((a,b)=>(POD_GOLD[a].turnover||999)-(POD_GOLD[b].turnover||999));
  podsGSorted.forEach(pod=>{
    const pg=POD_GOLD[pod];
    const cntG=GOLD.filter(g=>g.pod===pod).length;
    html+=`<tr onclick="openPod('${pod}')" style="cursor:pointer">
      <td style="font-weight:700;color:var(--pink)">${pod}</td>
      <td class="c">${turnTag(pg.turnover,true)}</td>
      <td class="r">${pg.sales_avg!=null?pg.sales_avg:'—'}</td>
      <td class="r">${cntG}</td>
    </tr>`;
  });
  html+=`</table></div>`;

  html+=`<div class="section-title">Все магазины · Золото</div>
  <div class="table-wrap"><table>
    <tr><th>Магазин</th><th>Под.</th><th class="c gold">Кат</th><th class="c gold">Об.</th><th class="c gold">Наполн.</th><th class="r gold">Физ. запас</th><th class="r gold">Продажи, шт</th></tr>`;
  [...GOLD].sort((a,b)=>(a.turn||999)-(b.turn||999)).forEach(g=>{
    html+=`<tr onclick="openMag('${g.mag}')" style="cursor:pointer">
      <td title="${g.tc}" style="white-space:nowrap"><b>${g.mag}</b><br><span style="font-size:9px;color:#888">${(function(tc){var p=tc.split(',');var c=p[0].trim();return(c.startsWith('ТЦ')||c.startsWith('ТРЦ')||c.startsWith('ТРК')||c.startsWith('ТК'))?(p[1]||c).trim().slice(0,11):c.slice(0,11);})(g.tc)}</span></td>
      <td style="font-size:11px;color:#666">${g.pod}</td>
      <td class="c" style="font-weight:600">${g.catYU!=null?Math.round(g.catYU):'—'}</td>
      <td class="c">${turnTag(g.turn,true)}</td>
      <td class="c">${fillTag(g.fill)}</td>
      <td class="r">${num(g.stock)}</td>
      <td class="r">${num(g.sales)}</td>
    </tr>`;
  });
  html+=`</table></div></div>`;

  document.getElementById('regionContent').innerHTML=html;
  showScreen('screenRegion');
}

function openMag(mag){
  const cur=document.querySelector('.screen.active');
  if(cur&&cur.id==='screenPod')pushHistory('pod:'+document.getElementById('headerTitle').textContent);
  else if(cur&&cur.id==='screenRegion')pushHistory('region');
  renderMag(mag);document.getElementById('backBtn').style.display='block';
}
function openPod(pod){
  pushHistory('region');renderPod(pod);
  document.getElementById('backBtn').style.display='block';
}
function switchTab(screen,tab,btn){
  const prefix=screen+'-tab-';
  document.querySelectorAll('[id^="'+prefix+'"]').forEach(el=>el.classList.remove('active'));
  document.getElementById(prefix+tab).classList.add('active');
  btn.closest('.tabs-bar').querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}
route();
</script>
