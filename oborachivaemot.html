<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>ЮИ · Оборачиваемость КАРИ ЮГ v1</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f7;color:#1c1c1e;font-size:14px}
:root{--pink:#ad1472;--pink-light:#f5e6f0;--gold-bg:#fffbeb;--gold-text:#92400e;
  --g:#16a34a;--g-bg:#dcfce7;--g-text:#14532d;
  --lg-bg:#dcfce7;--lg-text:#14532d;
  --y-bg:#fef9c3;--y-text:#713f12;
  --r-bg:#fee2e2;--r-text:#7f1d1d;
  --dr-bg:#7f1d1d;--dr-text:#fecaca;
  --n-bg:#f3f4f6;--n-text:#374151}
.header{background:var(--pink);color:#fff;padding:12px 16px;position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:10px}
.header h1{font-size:16px;font-weight:700;flex:1}
.header .period{font-size:11px;opacity:.8}
.back-btn{background:rgba(255,255,255,.2);border:none;color:#fff;padding:6px 12px;border-radius:8px;font-size:13px;cursor:pointer;display:none}
.screen{display:none;padding:12px;max-width:700px;margin:0 auto}
.screen.active{display:block}

/* Карточки метрик */
.metrics{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px}
.metrics.three{grid-template-columns:repeat(3,1fr)}
.metric-card{background:#fff;border-radius:12px;padding:12px 10px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.metric-card .val{font-size:22px;font-weight:700;line-height:1.1}
.metric-card .lbl{font-size:11px;color:#666;margin-top:3px}
.metric-card .sub{font-size:10px;color:#999;margin-top:2px}
.metric-card.highlight{background:var(--pink);color:#fff}
.metric-card.highlight .lbl,.metric-card.highlight .sub{color:rgba(255,255,255,.8)}
.metric-card.gold-card{background:var(--gold-bg)}
.metric-card.gold-card .val{color:var(--gold-text)}

/* Таблицы */
.section-title{font-size:13px;font-weight:700;color:var(--pink);margin:14px 0 6px;text-transform:uppercase;letter-spacing:.5px}
.table-wrap{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.08);margin-bottom:12px;overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:var(--pink);color:#fff;padding:8px 6px;text-align:left;font-weight:600;font-size:11px;white-space:nowrap}
th.r, td.r{text-align:right}
th.c, td.c{text-align:center}
td{padding:7px 6px;border-bottom:1px solid #f0f0f0;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafafa}
.store-name{font-weight:600;font-size:12px}
.store-tc{font-size:10px;color:#888;display:block}

/* Цвета оборачиваемости */
.tG {background:var(--g-bg);color:var(--g-text);border-radius:6px;padding:2px 6px;font-weight:700;display:inline-block}
.tLG{background:var(--lg-bg);color:var(--lg-text);border-radius:6px;padding:2px 6px;font-weight:600;display:inline-block}
.tY {background:var(--y-bg);color:var(--y-text);border-radius:6px;padding:2px 6px;font-weight:600;display:inline-block}
.tR {background:var(--r-bg);color:var(--r-text);border-radius:6px;padding:2px 6px;font-weight:600;display:inline-block}
.tDR{background:var(--dr-bg);color:var(--dr-text);border-radius:6px;padding:2px 6px;font-weight:600;display:inline-block}
.tN {background:var(--n-bg);color:var(--n-text);border-radius:6px;padding:2px 6px;display:inline-block}
.fill-ok{color:#16a34a;font-weight:700}
.fill-warn{color:#d97706;font-weight:600}
.fill-bad{color:#dc2626;font-weight:700}

/* Вкладки серебро/золото */
.tabs-bar{display:flex;gap:6px;margin-bottom:12px}
.tab-btn{flex:1;padding:8px;border:2px solid var(--pink);border-radius:10px;background:#fff;color:var(--pink);font-size:13px;font-weight:600;cursor:pointer}
.tab-btn.active{background:var(--pink);color:#fff}
.tab-pane{display:none}
.tab-pane.active{display:block}

/* Золото бейдж */
.gold-dot{display:inline-block;width:8px;height:8px;background:#d97706;border-radius:50%;margin-right:4px;vertical-align:middle}
.gold-badge{background:var(--gold-bg);color:var(--gold-text);border-radius:6px;padding:2px 7px;font-size:11px;font-weight:600}

/* Карточка магазина */
.store-header{background:#fff;border-radius:12px;padding:14px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.store-header .mag-num{font-size:12px;color:#999;font-weight:500}
.store-header .mag-name{font-size:17px;font-weight:700;margin:3px 0}
.store-header .mag-pod{font-size:13px;color:var(--pink);font-weight:600}

/* Таблица категорий */
.cat-table th{font-size:10px}
.cat-table td{font-size:11px}

/* Топ/Антитоп блок */
.topbot{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.topbot-card{background:#fff;border-radius:12px;padding:10px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.topbot-card h3{font-size:11px;font-weight:700;margin-bottom:8px;padding-bottom:5px;border-bottom:2px solid #f0f0f0}
.topbot-card h3.top{color:#16a34a;border-color:#dcfce7}
.topbot-card h3.bot{color:#dc2626;border-color:#fee2e2}
.topbot-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid #f9f9f9;font-size:11px}
.topbot-row:last-child{border-bottom:none}
.topbot-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-right:4px}

/* Сравнение с регионом */
.compare-bar{height:6px;background:#e5e7eb;border-radius:3px;margin-top:4px;overflow:hidden}
.compare-fill{height:100%;border-radius:3px;background:var(--pink)}

/* Пустой экран */
.empty{text-align:center;padding:40px 20px;color:#999}
.empty h2{font-size:16px;margin-bottom:8px;color:#666}

/* Подразделение кнопки */
.pod-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px}
.pod-btn{background:#fff;border-radius:12px;padding:12px;box-shadow:0 1px 3px rgba(0,0,0,.08);cursor:pointer;border:2px solid transparent;text-align:left}
.pod-btn:hover{border-color:var(--pink)}
.pod-btn .pod-name{font-size:14px;font-weight:700;color:var(--pink);margin-bottom:4px}
.pod-btn .pod-stats{font-size:11px;color:#666}

/* Рейтинг место */
.rank-badge{display:inline-block;background:var(--pink);color:#fff;border-radius:8px;padding:3px 8px;font-size:12px;font-weight:700}
.rank-badge.gold{background:#d97706}

/* Плашка периода */
.period-badge{display:inline-block;background:rgba(255,255,255,.15);border-radius:6px;padding:2px 8px;font-size:11px;margin-left:6px}
</style>
</head>

function nav(x) { return x != null ? x : '—'; }
function pct(x) { return x != null ? Math.round(x) + '%' : '—'; }
function num(x) { return x != null ? Math.round(x) : '—'; }

// Цвет оборачиваемости серебро: меньше = лучше. Бенчмарк ЮГ = 45 нед
function turnClass(t, isSer) {
  if (t == null) return 'tN';
  if (isSer !== false) {
    if (t <= 35) return 'tG';
    if (t <= 45) return 'tLG';
    if (t <= 55) return 'tY';
    if (t <= 70) return 'tR';
    return 'tDR';
  } else {
    // золото — бенчмарк ЮГ = 61 нед
    if (t <= 45) return 'tG';
    if (t <= 61) return 'tLG';
    if (t <= 75) return 'tY';
    if (t <= 90) return 'tR';
    return 'tDR';
  }
}
function turnLabel(t) {
  if (t == null) return '<span class="tN">—</span>';
  return `<span class="${turnClass(t)}">${Math.round(t)} нед</span>`;
}
function turnLabelGold(t) {
  if (t == null) return '<span class="tN">—</span>';
  return `<span class="${turnClass(t, false)}">${Math.round(t)} нед</span>`;
}
function fillClass(f) {
  if (f == null) return '';
  if (f >= 100) return 'fill-ok';
  if (f >= 85) return 'fill-warn';
  return 'fill-bad';
}
function fillLabel(f) {
  if (f == null) return '—';
  return `<span class="${fillClass(f)}">${Math.round(f)}%</span>`;
}

// Навигация
let _history = [];
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  const btn = document.getElementById('backBtn');
  btn.style.display = _history.length > 0 ? 'block' : 'none';
}
function goBack() {
  if (_history.length === 0) return;
  const prev = _history.pop();
  if (prev === 'region') renderRegion();
  else if (prev.startsWith('pod:')) renderPod(prev.slice(4));
}
function pushHistory(state) { _history.push(state); }

  const mag = params.get('mag');

      <div class="metric-card">
        <div class="val ${fillClass(s.fill)}">${s.fill != null ? Math.round(s.fill) + '%' : '—'}</div>
        <div class="lbl">Наполненность витрины</div>
        <div class="sub">${s.fillKor != null ? 'Корр: ' + Math.round(s.fillKor) + '%' : ''}</div>
      </div>
      <div class="metric-card">
        <div class="val">${num(s.sales)}</div>
        <div class="lbl">Продажи, шт/28 дней</div>
        <div class="sub">ЮГ: ${REG_SER.sales} шт</div>
      </div>
      <div class="metric-card">
        <div class="val">${num(s.stock)}</div>
        <div class="lbl">Остаток, шт</div>
        <div class="sub">ЮГ ср: ${REG_SER.stock} шт</div>
      </div>
    </div>`;

    // Сравнение с подразделением
    if (podS.turnover && s.turn) {
      const diff = Math.round(s.turn - podS.turnover);
      const sign = diff > 0 ? '+' : '';
      const cls = diff <= 0 ? 'fill-ok' : diff <= 5 ? 'fill-warn' : 'fill-bad';
      html += `<div class="store-header" style="padding:10px 14px;margin-bottom:12px">
        <div style="font-size:12px;color:#666">Подразделение <b>${s.pod}</b>: ${podS.turnover} нед</div>
        <div style="font-size:13px;font-weight:600;margin-top:3px">Ваш магазин: <span class="${cls}">${sign}${diff} нед ${diff < 0 ? '(лучше подразделения ✓)' : diff === 0 ? '(= среднему)' : '(хуже подразделения)'}</span></div>
      </div>`;
    }

    // Категории ЮИ
    if (s.cat) {
      html += `<div class="section-title">Категории ЮИ</div>
      <div class="table-wrap">
      <table class="cat-table">
        <tr><th>Категория</th><th class="r">Витрина</th><th class="r">Запас</th><th class="c">Оборачив.</th></tr>`;
      const cats = ['Кольца','Серьги','Цепочки','Браслеты','Колье','Подвески'];
      cats.forEach(cat => {
        const c = s.cat[cat];
        if (!c) return;
        html += `<tr>
          <td style="font-weight:600">${cat}</td>
          <td class="r">${num(c.fact)}</td>
          <td class="r">${num(c.stock)}</td>
          <td class="c">${turnLabel(c.turn)}</td>
        </tr>`;
      });
      html += `</table></div>`;
    }
  }

  if (g) {
    html += `<div class="section-title">⭐ Золото</div>
    <div class="metrics three">
      <div class="metric-card gold-card">
        <div class="val">${g.rating != null ? '#' + Math.round(g.rating) : '—'}</div>
        <div class="lbl">Место в рейтинге КАРИ</div>
        <div class="sub">из 473 магазинов</div>
      </div>
      <div class="metric-card gold-card">
        <div class="val">${turnLabelGold(g.turnover)}</div>
        <div class="lbl">Оборачиваемость</div>
        <div class="sub">ЮГ: ${REG_GOLD.turnover} нед</div>
      </div>
      <div class="metric-card gold-card">
        <div class="val">${g.share != null ? (g.share * 100).toFixed(1) + '%' : '—'}</div>
        <div class="lbl">Доля золота в ТО</div>
        <div class="sub">ЮГ: ${(REG_GOLD.share * 100).toFixed(1)}%</div>
      </div>
    </div>
    <div class="metrics">
      <div class="metric-card">
        <div class="val">${num(g.sales)}</div>
        <div class="lbl">Продажи, шт/28 дней</div>
        <div class="sub">Место: ${g.salesRank != null ? '#' + Math.round(g.salesRank) : '—'}</div>
      </div>
      <div class="metric-card">
        <div class="val">${num(g.stock)}</div>
        <div class="lbl">Остаток, шт</div>
      </div>
    </div>`;
  }

  document.getElementById('magContent').innerHTML = html;
  showScreen('screenMag');
}

// ===== ЭКРАН: ПОДРАЗДЕЛЕНИЕ =====
function renderPod(podName) {
  document.getElementById('headerTitle').textContent = podName;
  document.getElementById('headerSub').textContent = 'Подразделение ЮГ';
  document.getElementById('backBtn').style.display = 'none';

  const podS = POD_SER[podName] || {};
  const podG = POD_GOLD[podName];
  const stores = SILVER.filter(s => s.pod === podName);
  const storesGold = GOLD.filter(g => g.pod === podName);

  // Сортировка по оборачиваемости (по возрастанию)
  const sorted = [...stores].filter(s => s.turn != null).sort((a, b) => a.turn - b.turn);
  const top3 = sorted.slice(0, 3);
  const bot3 = sorted.slice(-3).reverse();

  let html = `
  <div class="metrics">
    <div class="metric-card highlight">
      <div class="val">${podS.turnover || '—'}</div>
      <div class="lbl">Оборачиваемость серебро</div>
      <div class="sub">ЮГ: ${REG_SER.turnover} нед</div>
    </div>
    <div class="metric-card">
      <div class="val">${podS.sales || '—'}</div>
      <div class="lbl">Продажи, шт/28 дн</div>
      <div class="sub">ЮГ: ${REG_SER.sales} шт</div>
    </div>
    <div class="metric-card">
      <div class="val">${stores.length}</div>
      <div class="lbl">Магазинов серебро</div>
    </div>
    <div class="metric-card">
      <div class="val">${storesGold.length}</div>
      <div class="lbl">Магазинов золото</div>
    </div>
  </div>`;

  // Топ/Антитоп
  html += `<div class="topbot">
    <div class="topbot-card">
      <h3 class="top">✅ Топ-3 оборачиваемость</h3>`;
  top3.forEach((s, i) => {
    const tc_short = s.tc.replace(/^[^,]+,\s*/, '');
    html += `<div class="topbot-row">
      <span class="topbot-name" title="${s.tc}">${tc_short || s.tc}</span>
      ${turnLabel(s.turn)}
    </div>`;
  });
  html += `</div>
    <div class="topbot-card">
      <h3 class="bot">🔴 Антитоп-3</h3>`;
  bot3.forEach((s, i) => {
    const tc_short = s.tc.replace(/^[^,]+,\s*/, '');
    html += `<div class="topbot-row">
      <span class="topbot-name" title="${s.tc}">${tc_short || s.tc}</span>
      ${turnLabel(s.turn)}
    </div>`;
  });
  html += `</div></div>`;

  // Вкладки Серебро/Золото
  const hasGold = storesGold.length > 0;
  html += `<div class="tabs-bar">
    <button class="tab-btn active" onclick="switchTab('pod','ser',this)">🥈 Серебро (${stores.length})</button>
    ${hasGold ? `<button class="tab-btn" onclick="switchTab('pod','gold',this)">⭐ Золото (${storesGold.length})</button>` : ''}
  </div>`;

  // Таблица серебро
  const sortedAll = [...stores].sort((a, b) => (a.turn || 999) - (b.turn || 999));
  html += `<div class="tab-pane active" id="pod-tab-ser">
  <div class="table-wrap">
  <table>
    <tr>
      <th>Магазин</th>
      <th class="c">Оборач.</th>
      <th class="c">Наполн.</th>
      <th class="r">Продажи</th>
    </tr>`;
  sortedAll.forEach(s => {
    html += `<tr onclick="openMag('${s.mag}')" style="cursor:pointer">
      <td>
        <span class="store-name">${s.mag}</span>
        <span class="store-tc">${s.tc}</span>
      </td>
      <td class="c">${turnLabel(s.turn)}</td>
      <td class="c">${fillLabel(s.fill)}</td>
      <td class="r">${num(s.sales)}</td>
    </tr>`;
  });
  html += `</table></div></div>`;

  // Таблица золото
  if (hasGold) {
    const sortedG = [...storesGold].sort((a, b) => (a.turnover || 999) - (b.turnover || 999));
    html += `<div class="tab-pane" id="pod-tab-gold">`;
    if (podG) {
      html += `<div class="metrics" style="margin-bottom:10px">
        <div class="metric-card gold-card">
          <div class="val">#${podG.rating || '—'}</div>
          <div class="lbl">Рейтинг среди подразд.</div>
        </div>
        <div class="metric-card gold-card">
          <div class="val">${turnLabelGold(podG.turnover)}</div>
          <div class="lbl">Оборачиваемость</div>
          <div class="sub">ЮГ: ${REG_GOLD.turnover} нед</div>
        </div>
      </div>`;
    }
    html += `<div class="table-wrap"><table>
      <tr>
        <th>Магазин</th>
        <th class="c">Рейтинг КАРИ</th>
        <th class="c">Оборач.</th>
        <th class="r">Доля ТО</th>
      </tr>`;
    sortedG.forEach(g => {
      html += `<tr onclick="openMag('${g.mag}')" style="cursor:pointer">
        <td>
          <span class="store-name">${g.mag}</span>
          <span class="store-tc">${g.tc}</span>
        </td>
        <td class="c">${g.rating != null ? '<span class="rank-badge gold">#' + Math.round(g.rating) + '</span>' : '—'}</td>
        <td class="c">${turnLabelGold(g.turnover)}</td>
        <td class="r">${g.share != null ? (g.share*100).toFixed(1)+'%' : '—'}</td>
      </tr>`;
    });
    html += `</table></div></div>`;
  }

  document.getElementById('podContent').innerHTML = html;
  showScreen('screenPod');
}

// ===== ЭКРАН: РЕГИОН (ЯНА) =====
function renderRegion() {
  document.getElementById('headerTitle').textContent = 'ЮИ · Оборачиваемость';
  document.getElementById('headerSub').textContent = 'Регион ЮГ · ' + PERIOD;
  document.getElementById('backBtn').style.display = 'none';
  _history = [];

  const pods = ['Краснодар','Черноморское','Кавказ','Крым','Ростов','Сочи'];

  let html = `
  <div class="metrics">
    <div class="metric-card highlight">
      <div class="val">${REG_SER.turnover}</div>
      <div class="lbl">Оборачиваемость серебро</div>
      <div class="sub">КАРИ: 52 нед</div>
    </div>
    <div class="metric-card gold-card">
      <div class="val">${REG_GOLD.turnover}</div>
      <div class="lbl">Оборачиваемость золото</div>
      <div class="sub">Место #${REG_GOLD.turnRank} в КАРИ</div>
    </div>
    <div class="metric-card">
      <div class="val">${SILVER.length}</div>
      <div class="lbl">Магазинов серебро</div>
    </div>
    <div class="metric-card">
      <div class="val">${GOLD.length}</div>
      <div class="lbl">Магазинов золото</div>
    </div>
  </div>`;

  // Вкладки
  html += `<div class="tabs-bar">
    <button class="tab-btn active" onclick="switchTab('reg','ser',this)">🥈 Серебро</button>
    <button class="tab-btn" onclick="switchTab('reg','gold',this)">⭐ Золото</button>
  </div>`;

  // === Вкладка Серебро ===
  html += `<div class="tab-pane active" id="reg-tab-ser">`;
  html += `<div class="section-title">Подразделения</div>
  <div class="table-wrap"><table>
    <tr><th>Подразделение</th><th class="c">Оборач.</th><th class="r">Продажи</th><th class="r">Магазинов</th></tr>`;
  const podsSorted = pods.filter(p => POD_SER[p]).sort((a,b) => (POD_SER[a].turnover||999)-(POD_SER[b].turnover||999));
  podsSorted.forEach(pod => {
    const ps = POD_SER[pod];
    const cnt = SILVER.filter(s => s.pod === pod).length;
    html += `<tr onclick="openPod('${pod}')" style="cursor:pointer">
      <td style="font-weight:700;color:var(--pink)">${pod}</td>
      <td class="c">${turnLabel(ps.turnover)}</td>
      <td class="r">${num(ps.sales)}</td>
      <td class="r">${cnt}</td>
    </tr>`;
  });
  html += `</table></div>`;

  // Таблица всех магазинов (серебро)
  html += `<div class="section-title">Все магазины · Серебро</div>
  <div class="table-wrap"><table>
    <tr><th>Магазин</th><th>Подразд.</th><th class="c">Оборач.</th><th class="c">Наполн.</th></tr>`;
  const allSorted = [...SILVER].sort((a,b) => (a.turn||999)-(b.turn||999));
  allSorted.forEach(s => {
    html += `<tr onclick="openMag('${s.mag}')" style="cursor:pointer">
      <td>
        <span class="store-name">${s.mag}</span>
        <span class="store-tc">${s.tc}</span>
      </td>
      <td style="font-size:11px;color:#666">${s.pod}</td>
      <td class="c">${turnLabel(s.turn)}</td>
      <td class="c">${fillLabel(s.fill)}</td>
    </tr>`;
  });
  html += `</table></div></div>`;

  // === Вкладка Золото ===
  html += `<div class="tab-pane" id="reg-tab-gold">`;
  html += `<div class="metrics" style="margin-bottom:10px">
    <div class="metric-card gold-card">
      <div class="val">#${Math.round(REG_GOLD.rating)}</div>
      <div class="lbl">Место ЮГ среди регионов</div>
      <div class="sub">Общий рейтинг: ${Math.round(REG_GOLD.total)}</div>
    </div>
    <div class="metric-card gold-card">
      <div class="val">${(REG_GOLD.share*100).toFixed(1)}%</div>
      <div class="lbl">Доля золота в ТО</div>
      <div class="sub">Место #${Math.round(REG_GOLD.shareRank)} в КАРИ</div>
    </div>
  </div>`;

  html += `<div class="section-title">Подразделения · Золото</div>
  <div class="table-wrap"><table>
    <tr><th>Подразделение</th><th class="c">Рейтинг</th><th class="c">Оборач.</th><th class="r">Доля ТО</th></tr>`;
  const podsGSorted = pods.filter(p => POD_GOLD[p]).sort((a,b) => (POD_GOLD[a].turnover||999)-(POD_GOLD[b].turnover||999));
  podsGSorted.forEach(pod => {
    const pg = POD_GOLD[pod];
    html += `<tr onclick="openPod('${pod}')" style="cursor:pointer">
      <td style="font-weight:700;color:var(--pink)">${pod}</td>
      <td class="c"><span class="rank-badge gold">#${Math.round(pg.rating)}</span></td>
      <td class="c">${turnLabelGold(pg.turnover)}</td>
      <td class="r">${(pg.share*100).toFixed(1)}%</td>
    </tr>`;
  });
  html += `</table></div>`;

  html += `<div class="section-title">Все магазины · Золото</div>
  <div class="table-wrap"><table>
    <tr><th>Магазин</th><th>Подразд.</th><th class="c">Рейтинг</th><th class="c">Оборач.</th><th class="r">Доля ТО</th></tr>`;
  const allGSorted = [...GOLD].sort((a,b) => (a.turnover||999)-(b.turnover||999));
  allGSorted.forEach(g => {
    html += `<tr onclick="openMag('${g.mag}')" style="cursor:pointer">
      <td>
        <span class="store-name">${g.mag}</span>
        <span class="store-tc">${g.tc}</span>
      </td>
      <td style="font-size:11px;color:#666">${g.pod}</td>
      <td class="c">${g.rating != null ? '<span class="rank-badge gold">#' + Math.round(g.rating) + '</span>' : '—'}</td>
      <td class="c">${turnLabelGold(g.turnover)}</td>
      <td class="r">${g.share != null ? (g.share*100).toFixed(1)+'%' : '—'}</td>
    </tr>`;
  });
  html += `</table></div></div>`;

  document.getElementById('regionContent').innerHTML = html;
  showScreen('screenRegion');
}

function openMag(mag) {
  const cur = document.querySelector('.screen.active');
  if (cur && cur.id === 'screenPod') pushHistory('pod:' + document.getElementById('headerTitle').textContent);
  else if (cur && cur.id === 'screenRegion') pushHistory('region');
  renderMag(mag);
  document.getElementById('backBtn').style.display = 'block';
}
function openPod(pod) {
  pushHistory('region');
  renderPod(pod);
  document.getElementById('backBtn').style.display = 'block';
}
function switchTab(screen, tab, btn) {
  const prefix = screen + '-tab-';
  document.querySelectorAll('[id^="' + prefix + '"]').forEach(el => el.classList.remove('active'));
  document.getElementById(prefix + tab).classList.add('active');
  btn.closest('.tabs-bar').querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

// Запуск
route();
</script>
</body>
</html>
